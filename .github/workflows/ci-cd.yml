name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build with Maven
        working-directory: ./vocaldoc-backend
        run: mvn clean package -DskipTests
        
      - name: Build Docker image
        working-directory: ./vocaldoc-backend
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}

  build-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        working-directory: ./vocaldoc-analysis
        run: |
          pip install -r requirements.txt
          
      - name: Run tests
        working-directory: ./vocaldoc-analysis
        run: pytest tests/ -v
        
      - name: Build Docker image
        working-directory: ./vocaldoc-analysis
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/analysis:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/analysis:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        working-directory: ./vocaldoc-web
        run: npm ci
        
      - name: Lint
        working-directory: ./vocaldoc-web
        run: npm run lint
        
      - name: Build
        working-directory: ./vocaldoc-web
        run: npm run build
        
      - name: Build Docker image
        working-directory: ./vocaldoc-web
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}

  deploy:
    needs: [build-backend, build-analysis, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/vocaldoc
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            docker system prune -f

  notify:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: echo "Deployment completed successfully!"
