services:
  # MySQL 8.0 数据库服务
  mysql:
    image: mysql:8.0
    container_name: vocaldoc-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: vocaldoc
      MYSQL_USER: vocaldoc
      MYSQL_PASSWORD: vocaldoc123
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=1000
    networks:
      - vocaldoc-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7 服务
  redis:
    image: redis:7-alpine
    container_name: vocaldoc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - vocaldoc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx 反向代理服务 (可选)
  nginx:
    image: nginx:alpine
    container_name: vocaldoc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/logs:/var/log/nginx
    networks:
      - vocaldoc-network
    depends_on:
      - mysql
      - redis

networks:
  vocaldoc-network:
    driver: bridge

volumes:
  mysql-data:
    name: vocaldoc-mysql-data
  redis-data:
    name: vocaldoc-redis-data
