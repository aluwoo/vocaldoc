# Docker Compose - Production Environment

version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: vocaldoc-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: vocaldoc
      MYSQL_USER: vocaldoc
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vocaldoc-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vocaldoc-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vocaldoc-network
    command: redis-server --appendonly yes

  # Backend API
  backend:
    build:
      context: ./vocaldoc-backend
      dockerfile: Dockerfile
    container_name: vocaldoc-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: production
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vocaldoc-network

  # Voice Analysis Service
  analysis:
    build:
      context: ./vocaldoc-analysis
      dockerfile: Dockerfile
    container_name: vocaldoc-analysis
    restart: always
    environment:
      ANALYSIS_PORT: 8000
    ports:
      - "8000:8000"
    networks:
      - vocaldoc-network

  # Frontend Web
  web:
    build:
      context: ./vocaldoc-web
      dockerfile: Dockerfile
    container_name: vocaldoc-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - vocaldoc-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vocaldoc-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - analysis
      - web
    networks:
      - vocaldoc-network

volumes:
  mysql-data:
  redis-data:

networks:
  vocaldoc-network:
    driver: bridge
